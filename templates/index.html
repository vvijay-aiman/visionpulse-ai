<!DOCTYPE html>

<html>
<head>
    <title>VisionPulse AI</title>

```
<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 40px;
    }

    .card {
        max-width: 750px;
        margin: auto;
        background: #1e293b;
        padding: 30px;
        border-radius: 20px;
    }

    input {
        margin: 20px;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    .result {
        margin-top: 20px;
        background: #334155;
        padding: 20px;
        border-radius: 12px;
    }
</style>
```

</head>

<body>

<div class="card">

```
<h1>🤖 VisionPulse AI</h1>

<h3>📸 Face Analysis System</h3>

<p>Upload a face image to estimate age and gender using AI.</p>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="photo" required>
    <br>
    <button type="submit">Predict</button>
</form>

{% if result %}
<div class="result">
    <h2>🤖 AI Prediction Result</h2>

    <p>
        <strong>🎂 Estimated Age:</strong>
        {{ result.age }}
    </p>

    <p>
        <strong>🚻 Predicted Gender:</strong>
        {{ result.gender }}
    </p>
</div>
{% endif %}
```

</div>

</body>
</html>
